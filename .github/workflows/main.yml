- name: Install Buildozer and Dependencies
        run: |
          sudo apt update
          # Using universal names (no version numbers) to avoid "Not Found" errors
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses-dev libncursesw-dev libtinfo-dev cmake libffi-dev libssl-dev openjdk-17-jdk
          pip install --upgrade pip
          pip install buildozer cython
