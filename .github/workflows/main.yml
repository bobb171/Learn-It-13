name: Build Learn It 13.0 APK
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        # Using the official action path for 2026
        uses: GearSnd/buildozer-action@v1
        with:
          buildozer_version: master
          python_version: 3.11

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Learn-It-13-APK
          path: bin/*.apk
