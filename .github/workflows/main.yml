name: Build Learn It 13.0 APK
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.11'

      - name: Install Buildozer and Dependencies
        run: |
          sudo apt update
          # Updated list for Ubuntu 24.04 (Noble)
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses6-dev libncursesw6-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK with Buildozer
        run: |
          # The "yes |" ensures we don't get stuck on license prompts
          yes | buildozer -v android debug
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Learn-It-13-APK
          path: bin/*.apk
